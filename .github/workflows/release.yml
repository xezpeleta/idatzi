name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-13, windows-2025]
        include:
          - os: ubuntu-22.04
            artifact-name: idatzi-linux-x64
          - os: macos-13
            artifact-name: idatzi-darwin-x64
          - os: windows-2025
            artifact-name: idatzi-win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -e .

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Package Electron app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          npx electron-builder --linux --x64 --publish=never --config.electronDist="$(dirname $(which electron))/.." --config.electronVersion="$(npx electron --version)"
          7z a "${{ matrix.artifact-name }}.7z" dist/linux-unpacked/

      - name: Package Electron app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          npx electron-builder --mac --x64 --publish=never --config.electronDist="$(dirname $(which electron))/.." --config.electronVersion="$(npx electron --version)"
          cd dist/mac && zip -r "../../${{ matrix.artifact-name }}.zip" "Idatzi.app"

      - name: Package Electron app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $electronDist = Split-Path (Get-Command electron).Source -Parent
          npx electron-builder --win --x64 --publish=never --config.electronDist="$electronDist" --config.electronVersion="$(npx electron --version)"
          7z a "${{ matrix.artifact-name }}.7z" dist/win-unpacked/

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-name }}.7z
            ${{ matrix.artifact-name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            artifacts/idatzi-linux-x64/idatzi-linux-x64.7z
            artifacts/idatzi-darwin-x64/idatzi-darwin-x64.zip
            artifacts/idatzi-win-x64/idatzi-win-x64.7z
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
