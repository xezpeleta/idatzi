name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2025]
        include:
          - os: ubuntu-22.04
            artifact-name: idatzi-linux-x64
          - os: macos-14
            artifact-name: idatzi-darwin-arm64
          - os: windows-2025
            artifact-name: idatzi-win-x64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: npm ci

      - name: Install Python dependencies
        run: pip install -e .

      - name: Build idaztian (git dep)
        shell: bash
        run: |
          if [ -d node_modules/idaztian/packages/idaztian ]; then
            cd node_modules/idaztian
            npm install --ignore-scripts
            cd packages/idaztian
            npx tsc --declaration false --declarationMap false && npx vite build
            cd ../../..
          fi

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm run test -- --passWithNoTests || true

      - name: Build
        run: npm run build

      - name: Sync version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Syncing package.json version to $VERSION"
          node -e "const p=require('./package.json');p.version='${VERSION}';require('fs').writeFileSync('./package.json',JSON.stringify(p,null,2)+'\n')"
          echo "package.json version is now: $(node -p 'require("./package.json").version')"

      - name: Package Electron app (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          PLATFORM: linux-x64
        run: |
          npx electron-builder --linux --x64 --publish=never
          mkdir -p packages
          VERSION="${GITHUB_REF#refs/tags/}"
          for f in dist/*.AppImage dist/*.deb; do
            [ -f "$f" ] || continue
            base="${f##*/}"
            ext="${base##*.}"
            target="packages/Idatzi-${VERSION}-${PLATFORM}.${ext}"
            cp "$f" "$target"
          done
          ls -la packages/

      - name: Package Electron app (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          PLATFORM: darwin-arm64
        run: |
          npx electron-builder --mac --arm64 --publish=never
          mkdir -p packages
          VERSION="${GITHUB_REF#refs/tags/}"
          for f in dist/*.dmg; do
            [ -f "$f" ] || continue
            target="packages/Idatzi-${VERSION}-${PLATFORM}.dmg"
            cp "$f" "$target"
          done
          macdir=$(ls -d dist/mac* 2>/dev/null | head -1)
          if [ -n "$macdir" ]; then
            cd "$macdir" && zip -r "../../${{ matrix.artifact-name }}.zip" "Idatzi.app"
          fi

      - name: Package Electron app (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          PLATFORM: win-x64
        run: |
          npx electron-builder --win --x64 --publish=never
          mkdir packages
          $VERSION = "$env:GITHUB_REF" -replace '^refs/tags/', ''
          Get-ChildItem dist\*.exe | ForEach-Object {
            $target = "packages/Idatzi-${VERSION}-$env:PLATFORM.exe"
            Copy-Item $_.FullName $target
          }
          Get-ChildItem packages\

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            packages/*
            ${{ matrix.artifact-name }}.zip
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Display structure
        run: ls -R artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: artifacts/**/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
