name: Deploy Demo to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout idatzi
        uses: actions/checkout@v4

      - name: Checkout Idaztian
        uses: actions/checkout@v4
        with:
          repository: xezpeleta/Idaztian
          ref: main
          path: Idaztian

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Idaztian dependencies
        working-directory: Idaztian
        run: npm ci

      - name: Build Idaztian
        working-directory: Idaztian
        run: npm run build

      - name: Setup workspace for file dependency resolution
        run: |
          # Create symlink so that file:../Idaztian resolves correctly.
          # In CI, repos are checked out side-by-side under idatzi/,
          # so the parent-relative path needs to point to the sibling.
          ln -s "$(pwd)/Idaztian" ../Idaztian

      - name: Install idatzi dependencies
        run: npm install --no-package-lock

      - name: Build demo
        run: npx vite build --config vite.demo.config.ts

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './demo-dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
